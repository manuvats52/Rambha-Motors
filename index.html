                                        </div>
                                        <div class="flex items-baseline gap-1">
                                            <span class="text-sm font-semibold text-slate-500">INR</span>
                                            <span class="text-5xl font-black text-primary">{pkg.price}</span>
                                        </div>
                                        <button onClick={() => navigate('/contact')} class={`w-full py-3 rounded-lg font-bold transition-all ${pkg.featured ? 'bg-primary text-white' : 'bg-slate-100 dark:bg-slate-800 text-primary'}`}>Enroll Now</button>
                                        <ul class="space-y-4">
                                            {pkg.perks.map((p, j) => (
                                                <li key={j} class="flex items-center gap-3 text-sm">
                                                    <span class="material-symbols-outlined text-primary text-xl">check_circle</span>
                                                    {p}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>
                    <Footer />
                </div>
            );
        };

        const GalleryScreen = () => {
    const [currentIndex, setCurrentIndex] = useState(null);

    const items = [
        { img: "./car_1_image.png", title: "Training Fleet Side View", desc: "Dual-control Car" },
        { img: "./driving_class_1_image.png", title: "Practical Driving Session at night", desc: "Learner practicing driving with instructor" },
        { img: "./car_2_image.png", title: "Training Fleet Front View", desc: "Dual-control Car" },
        { img: "./driving_class_2_image.png", title: "Practical Driving Session", desc: "Learner practicing driving with instructor" },
        { img: "./driving_class_3_image.png", title: "Practical Driving Session", desc: "Learner practicing driving with instructor" },
        { img: "./driving_class_4_image.png", title: "Practical Driving Session", desc: "Learner practicing driving with instructor" },
    ];

    const prevImage = (e) => {
        e.stopPropagation();
        setCurrentIndex((prev) =>
            prev === 0 ? items.length - 1 : prev - 1
        );
    };

    const nextImage = (e) => {
        e.stopPropagation();
        setCurrentIndex((prev) =>
            prev === items.length - 1 ? 0 : prev + 1
        );
    };

    return (
        <div class="flex flex-col min-h-screen">
            <Navbar />

            <main class="flex-1 max-w-[1280px] mx-auto px-10 py-12">
                <h1 class="text-4xl font-black mb-8 border-l-4 border-primary pl-6">
                    Photo Gallery
                </h1>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    {items.map((item, i) => (
                        <div
                            key={i}
                            class="group rounded-xl bg-white dark:bg-slate-800 p-3 shadow-sm hover:-translate-y-2 transition-transform cursor-pointer"
                            onClick={() => setCurrentIndex(i)}
                        >
                            <div class="aspect-video overflow-hidden rounded-lg mb-4">
                                <img
                                    src={item.img}
                                    class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                                    alt={item.title}
                                />
                            </div>
                            <h3 class="text-lg font-bold">{item.title}</h3>
                            <p class="text-sm text-slate-500">{item.desc}</p>
                        </div>
                    ))}
                </div>
            </main>

            <Footer />

            {/* 🔥 Lightbox Modal */}
            {currentIndex !== null && (
                <div
                    class="fixed inset-0 bg-black/80 flex items-center justify-center z-50"
                    onClick={() => setCurrentIndex(null)}
                >
                    {/* ❌ Close */}
                    <button
                        class="absolute top-6 right-6 text-white text-3xl font-bold"
                        onClick={() => setCurrentIndex(null)}
                    >
                        ✕
                    </button>

                    {/* ◀ Left Arrow */}
                    <button
                        class="absolute left-6 text-white text-5xl font-bold hover:scale-110 transition"
                        onClick={prevImage}
                    >
                        ‹
                    </button>

                    {/* Image */}
                    <img
                        src={items[currentIndex].img}
                        class="max-w-[90%] max-h-[90%] rounded-lg shadow-lg"
                        onClick={(e) => e.stopPropagation()}
                    />

                    {/* ▶ Right Arrow */}
                    <button
                        class="absolute right-6 text-white text-5xl font-bold hover:scale-110 transition"
                        onClick={nextImage}
                    >
                        ›
                    </button>
                </div>
            )}
        </div>
    );
};



        const RoadSignsScreen = () => {
            const signs = [
                { title: "Stop", cat: "Mandatory", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuCqfVeuPp3Jo0JBo3AYPvV8tpo5x9dNVyNprP_7TeCTuoUuTYRhcsnuJIys8c3YLrSVYahbPGeM1BPS7ldPAr9OrF8WkVE6kurrikjSVONZp_TkDLiA5WoJZJSnUkwphKcfOIa0VSw_zJmQ1AmT0sCwqQ-S0ZfC4wON5SBBIbppX3XXEoveBwMIB3flWe-h5gnFRjcE1bx6t_ti81GbqB60lv_idQyKDCH2XPqazqWdzIxMF7Sb53-oyQRbq95f8c-_S84fv8yWf-o" },
                { title: "No Entry", cat: "Mandatory", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuAa1-0kv7pvnC_3u2mAxGdAoEN6pQ_fuAU9ZuGpF5FQ2kb2b--hnXQSjpnp-dVOl2oVUa36da3gP4lkaye5Qj-r-wFxCZLwCBEHkS8OF4xsLMxBmpDJMcsEyQvvf2jICtIv017kyAWRj_J0Ro8W6qfH3unkQ3JIZcUCFxFlNM-Up4rdodqU_8I73G7QmtXh-8mNg-IkZI-u4CdpLtiAj5GajOltpbJh4EPWysgxIYIGudSEUCp0CML534gAijJzAl2NZcPWvQt26fw" },
                { title: "Speed Limit 50", cat: "Mandatory", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuA6Z3cnhvpxGSVt2pvvsyqNIK2Q1FWRgZtsSnT-myyhwZHl4CZYEwDCsvcm3T23tWKHXEz9DE14K4x-u2TZnxgTzuK0DV4l0h0zUhrSRk0ghz2x1UQ32AHkonLmBEOgKBwHnJiBTKzFXZUSRqCC0rJw7yZ4s-kMhC55dkZEODClC8MbsAb_19JCV_VSGoP028rZLy7E9mdK-d-SCSXV89W1-czOGk0Fgi0fQ09bEsOgkY6XEFNzjIBfIn56kjdhNAlEjykLHTgdxiw" }
            ];

            return (
                <div class="flex flex-col min-h-screen">
                    <Navbar />
                    <main class="flex-1 max-w-[1200px] mx-auto px-10 py-12">
                        <h1 class="text-4xl font-black mb-4">Road Signs Guide</h1>
                        <p class="text-slate-500 mb-12">Comprehensive guide for the RTO driving license test.</p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {signs.map((sign, i) => (
                                <div key={i} class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                                    <div class="aspect-square bg-slate-50 dark:bg-slate-900 rounded-lg flex items-center justify-center mb-4 border border-slate-100 dark:border-slate-700">
                                        <img src={sign.img} class="w-24 h-24 object-contain" alt={sign.title}/>
                                    </div>
                                    <h3 class="font-bold text-lg">{sign.title}</h3>
                                    <p class="text-xs text-primary font-bold uppercase">{sign.cat}</p>
                                </div>
                            ))}
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const ContactScreen = () => {
        const [formData, setFormData] = useState({
            name: "",
            phone: "",
            address: "",
            course: "",
            });
        const navigate = useNavigate();
        const [success, setSuccess] = useState(false);

        const handleSubmit = (e) => {
            e.preventDefault();

            if (!e.target.checkValidity()) {
                e.target.reportValidity();
                return;
            }

            emailjs
                .send(
                "service_zgtwfoe",       // ✅ Service ID
                "template_plwajca",      // ✅ Template ID
                {
                    name: formData.name,
                    phone: formData.phone,
                    address: formData.address,
                    course: formData.course,
                }
                )
                .then(
                () => {
                    setSuccess(true);

                    setTimeout(() => {
                    navigate("/");
                    }, 10000);
                },
                (error) => {
                    alert("Email failed ❌");
                    console.error(error);
                }
                );
        };

        return (
            <div className="flex flex-col min-h-screen">
            <Navbar />

            <main className="flex-1 max-w-[1200px] mx-auto px-10 py-12">
                <h1 className="text-4xl font-black mb-4">Contact Us</h1>
                <p className="text-slate-500 mb-12">Book your trial session today.</p>

                {success && (
                <div className="mb-8 bg-green-100 border border-green-400 text-green-700 px-6 py-4 rounded-lg flex items-center gap-3">
                    <span className="material-symbols-outlined text-green-600">
                    check_circle
                    </span>
                    <p className="font-semibold">
                    Form submitted successfully! Redirecting to dashboard in 10 seconds...
                    </p>
                </div>
                )}

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <form
                    onSubmit={handleSubmit}
                    className={`lg:col-span-7 bg-white dark:bg-slate-900 p-8 rounded-xl border border-slate-200 dark:border-slate-800 space-y-6
                    ${success ? "opacity-60 pointer-events-none" : ""}
                    `}
                    >
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <label className="flex flex-col gap-2">
                        <span className="text-sm font-semibold">Name</span>
                        <input
                            required
                            disabled={success}
                            type="text"
                            maxLength={30}
                            value={formData.name}
                            onChange={(e) =>
                            setFormData({ ...formData, name: e.target.value })
                            }
                            onInput={(e) =>
                            (e.target.value = e.target.value.replace(/[^A-Za-z ]/g, ""))
                            }
                            className="h-12 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 rounded-lg px-4"
                        />
                        </label>

                        <label className="flex flex-col gap-2">
                        <span className="text-sm font-semibold">Phone Number</span>
                        <div className="flex">
                            <span className="flex items-center px-3 bg-slate-200 dark:bg-slate-800 border border-r-0 rounded-l-lg text-sm font-semibold">
                            +91
                            </span>
                            <input
                            required
                            disabled={success}
                            type="tel"
                            maxLength={10}
                            minLength={10}
                            pattern="[0-9]{10}"
                            title="Please enter 10 digit phone number"
                            value={formData.phone}
                            onChange={(e) =>
                                setFormData({ ...formData, phone: e.target.value })
                            }
                            onInput={(e) =>
                                (e.target.value = e.target.value.replace(/[^0-9]/g, ""))
                            }
                            className="h-12 flex-1 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 rounded-r-lg px-4"
                            />
                        </div>
                        </label>

                        <label className="flex flex-col gap-2 md:col-span-2">
                        <span className="text-sm font-semibold">Address</span>
                        <textarea
                            required
                            disabled={success}
                            rows="3"
                            maxLength={90}
                            value={formData.address}
                            onChange={(e) =>
                            setFormData({ ...formData, address: e.target.value })
                            }
                            className="border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 rounded-lg px-4 py-3 resize-none"
                        />
                        </label>

                        <label className="flex flex-col gap-2 md:col-span-2">
                        <span className="text-sm font-semibold">Select Course</span>
                        <select
                            required
                            disabled={success}
                            value={formData.course}
                            onChange={(e) =>
                            setFormData({ ...formData, course: e.target.value })
                            }
                            className="h-12 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 rounded-lg px-4"
                        >
                            <option value="">-- Select a Course --</option>
                            <option value="Silver">Silver</option>
                            <option value="Gold">Gold</option>
                            <option value="Platinum">Platinum</option>
                        </select>
                        </label>
                    </div>

                    <button
                        type="submit"
                        disabled={success}
                        className={`w-full font-bold h-14 rounded-lg transition-all ${
                        success
                            ? "bg-green-500 cursor-not-allowed"
                            : "bg-primary text-white hover:bg-primary/90"
                        }`}
                    >
                        {success ? "Submitted ✓" : "Book Trial Lesson"}
                    </button>
                </form>

                <div className="lg:col-span-5 space-y-6">
                    <div className="bg-primary text-white p-8 rounded-xl shadow-xl">
                    <h3 className="text-xl font-bold mb-4">Contact Info</h3>
                    <div className="space-y-4">
                        <div className="flex items-center gap-4">
                        <span className="material-symbols-outlined">person</span>
                        <div>
                            <p className="text-xs opacity-70">Support Head</p>
                            <p className="font-bold">Guddu Pandit</p>
                        </div>
                        </div>
                        <div className="flex items-center gap-4">
                        <span className="material-symbols-outlined">call</span>
                        <div>
                            <p className="text-xs opacity-70">Phone</p>
                            <a href="tel:+919720340320" className="font-bold hover:underline">
                            +91 9720340320
                            </a>
                        </div>
                        </div>
                    </div>
                    </div>

                    <div className="aspect-video bg-slate-200 dark:bg-slate-800 rounded-xl overflow-hidden">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3497.763497084748!2d77.76492121047634!3d28.75647737549544!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390c85e7f2c222a5%3A0xa7326347dd2f8eb0!2sRegional%20Transport%20Office%20RTO%20HAPUR!5e0!3m2!1sen!2sin!4v1769594376447!5m2!1sen!2sin"
                        width="100%"
                        height="100%"
                        frameBorder="0"
                    />
                    </div>
                </div>
                </div>
            </main>

            <Footer />
            </div>
        );
        };
            // --- Main App ---

            const App = () => {
                return (
                    <MemoryRouter>
                        <Routes>
                            <Route path="/" element={<HomeScreen />} />
                            <Route path="/about" element={<AboutScreen />} />
                            <Route path="/courses" element={<CoursesScreen />} />
                            <Route path="/gallery" element={<GalleryScreen />} />
                            <Route path="/road-signs" element={<RoadSignsScreen />} />
                            <Route path="/contact" element={<ContactScreen />} />
                        </Routes>
                    </MemoryRouter>
                );
            };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
